<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 11 - CSS Box Model</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Day 11: Understand content, padding, border, margin, width, height, and box-sizing. -->
    <h1>CSS Box Model</h1>
    <p>Every HTML element is treated like a box in CSS.</p>

    <div class="margin-box">
        Margin
        <div class="border-box">
            Border
            <div class="padding-box">
                Padding
                <div class="content-box">Content</div>
            </div>
        </div>
    </div>
</body>
</html>
