<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 14 - CSS Flexbox and Grid</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Day 14: Build layouts using Flexbox and CSS Grid. -->
    <h1>CSS Flexbox and Grid</h1>

    <section>
        <h2>Flexbox Card Layout</h2>
        <div class="flex-cards">
            <article class="card">HTML</article>
            <article class="card">CSS</article>
            <article class="card">Projects</article>
        </div>
    </section>

    <section>
        <h2>Grid Gallery Layout</h2>
        <div class="gallery">
            <div>1</div>
            <div>2</div>
            <div>3</div>
            <div>4</div>
            <div>5</div>
            <div>6</div>
        </div>
    </section>
</body>
</html>
