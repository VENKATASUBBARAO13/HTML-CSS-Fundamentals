<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 6 - HTML Tables</title>
</head>
<body>
    <!-- Day 6: Learn table rows, headings, data cells, colspan, and rowspan. -->
    <h1>HTML Tables</h1>

    <table border="1">
        <tr>
            <th colspan="4">Student Course Progress</th>
        </tr>
        <tr>
            <th>Student</th>
            <th>Course</th>
            <th>Progress</th>
            <th>Status</th>
        </tr>
        <tr>
            <td rowspan="2">Bunny</td>
            <td>HTML Basics</td>
            <td>100%</td>
            <td>Completed</td>
        </tr>
        <tr>
            <td>CSS Basics</td>
            <td>60%</td>
            <td>In Progress</td>
        </tr>
        <tr>
            <td>Arya</td>
            <td>HTML Forms</td>
            <td>80%</td>
            <td>Almost Done</td>
        </tr>
    </table>

    <p>The table tag creates the table. tr creates rows, th creates headings, and td creates data cells.</p>
</body>
</html>
