<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 12 - CSS Display and Position</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Day 12: Compare display values and CSS positioning. -->
    <h1>CSS Display and Position</h1>

    <section>
        <h2>Display Examples</h2>
        <div class="block-box">display: block</div>
        <span class="inline-box">display: inline</span>
        <span class="inline-box">another inline</span>
        <div class="inline-block-box">display: inline-block</div>
        <div class="hidden-box">display: none</div>
    </section>

    <section class="position-area">
        <h2>Position Examples</h2>
        <div class="static-box">position: static</div>
        <div class="relative-box">position: relative</div>
        <div class="absolute-box">position: absolute</div>
    </section>

    <div class="fixed-box">position: fixed</div>
</body>
</html>
